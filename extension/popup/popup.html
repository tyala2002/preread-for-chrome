<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preread</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════
       ヘッダー
  ═══════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-logo">
      <img src="../icons/icon48.png" alt="Preread" class="header-icon" />
      <span class="header-title">Preread</span>
    </div>
    <a href="#" id="btn-open-options" class="header-settings" data-i18n-title="book_title_edit_title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-settings">
        <path
          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    </a>
  </header>

  <!-- ═══════════════════════════════════════════════════════════
       書籍タイトル表示エリア
  ═══════════════════════════════════════════════════════════ -->
  <section class="book-section">
    <div class="book-title-row">
      <span class="label" data-i18n="book_title_label">書籍タイトル</span>
      <button id="btn-edit-title" class="btn-text" data-i18n-title="book_title_edit_title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-pencil">
          <path
            d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
          <path d="m15 5 4 4" />
        </svg>
      </button>
    </div>
    <!-- タイトル表示（通常時） -->
    <p id="book-title-display" class="book-title">—</p>
    <!-- タイトル手入力（編集モード） -->
    <input id="book-title-input" type="text" class="book-title-input hidden" data-i18n-placeholder="book_title_placeholder" />
    <!-- Amazonページ以外で開いたときの警告 -->
    <div id="msg-not-amazon" class="msg-warning hidden">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-triangle-alert">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
        <path d="M12 9v4" />
        <path d="M12 17h.01" />
      </svg>
      <span data-i18n="msg_not_amazon">Amazonの書籍ページで開いてください</span>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       検索ボタン
  ═══════════════════════════════════════════════════════════ -->
  <div class="search-row">
    <button id="btn-search" class="btn-primary" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-search">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </svg>
      <span data-i18n="btn_search">ソースを検索</span>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       追加済み書籍リスト
  ═══════════════════════════════════════════════════════════ -->
  <section id="recent-books-section" class="recent-books-section hidden">
    <h3 class="recent-books-heading">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-book-marked">
        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
        <polyline points="10 2 10 10 13 7 16 10 16 2" />
      </svg>
      <span data-i18n="recent_books_heading">追加済みの書籍</span>
    </h3>
    <ul id="recent-books-list" class="recent-books-list"></ul>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       ローディングスピナー
  ═══════════════════════════════════════════════════════════ -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <span id="loading-text">検索中...</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       APIキー未設定警告
  ═══════════════════════════════════════════════════════════ -->
  <div id="msg-no-api-key" class="msg-error hidden">
    <p>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-triangle-alert">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
        <path d="M12 9v4" />
        <path d="M12 17h.01" />
      </svg>
      <span data-i18n="msg_no_api_key">Web記事検索のAPIキーが設定されていません。YouTubeはAPIキー不要で動作します。</span>
    </p>
    <button id="btn-go-options" class="btn-secondary" data-i18n="btn_go_options">設定画面を開く</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       検索結果エリア（検索完了後に表示）
  ═══════════════════════════════════════════════════════════ -->
  <section id="results-section" class="results-section hidden">

    <!-- 全選択 / 全解除 -->
    <div class="select-controls">
      <button id="btn-select-all" class="btn-text" data-i18n="btn_select_all">全選択</button>
      <span class="divider">|</span>
      <button id="btn-deselect-all" class="btn-text" data-i18n="btn_deselect_all">全解除</button>
    </div>

    <!-- ── Web記事セクション ──────────────────────────── -->
    <div class="source-group">
      <h3 class="source-group-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-file-text">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="M10 9H8" />
          <path d="M16 13H8" />
          <path d="M16 17H8" />
        </svg>
        <span data-i18n="section_articles">Web記事</span>
      </h3>
      <ul id="list-articles" class="source-list">
        <!-- JS で動的に生成される -->
      </ul>
    </div>

    <!-- ── YouTube動画セクション ─────────────────────── -->
    <div class="source-group">
      <h3 class="source-group-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-youtube">
          <path
            d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17" />
          <path d="m10 15 5-3-5-3z" />
        </svg>
        <span data-i18n="section_videos">YouTube動画</span>
      </h3>
      <ul id="list-videos" class="source-list">
        <!-- JS で動的に生成される -->
      </ul>
    </div>

    <!-- ── アクションボタン群 ─────────────────────────── -->
    <div id="action-buttons-container" class="action-buttons">
      <!-- クリップボードコピー -->
      <button id="btn-copy-urls" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-copy">
          <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
        </svg>
        <span data-i18n="btn_copy_urls">URLをコピー</span>
      </button>
      <!-- NotebookLMへ追加 -->
      <button id="btn-add-to-notebooklm" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-plus">
          <path d="M5 12h14" />
          <path d="M12 5v14" />
        </svg>
        <span data-i18n="btn_add_to_notebooklm">NotebookLMに追加</span>
      </button>
    </div>

    <!-- ── 進捗バー（NotebookLM追加中） ───────────────── -->
    <div id="progress-area" class="progress-area hidden">
      <div class="progress-bar-track">
        <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <p id="progress-text" class="progress-text">0 / 0 件追加中...</p>
    </div>

    <!-- ── 完了メッセージ ─────────────────────────────── -->
    <div id="msg-success" class="msg-success hidden">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-check" style="color: var(--color-success);">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      <span id="msg-success-text"></span>
    </div>

    <!-- ── ノートブックリンク（追加完了後に表示） ────── -->
    <div id="notebook-link-area" class="notebook-link-area hidden">
      <a id="notebook-link" href="#" target="_blank" class="btn-notebook-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-book-open">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span data-i18n="btn_open_notebooklm">NotebookLMで開く</span>
      </a>
    </div>

    <!-- ── エラー一覧（失敗したURL） ──────────────────── -->
    <div id="error-area" class="error-area hidden">
      <div class="error-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-triangle-alert">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        </svg>
        <span data-i18n="error_failed_urls_title">以下のURLの追加に失敗しました：</span>
      </div>
      <ul id="list-errors" class="error-list"></ul>
      <button id="btn-retry-failed" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-rotate-cw">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
        <span data-i18n="btn_retry_failed">失敗分を再試行</span>
      </button>
    </div>

  </section>

  <script type="module" src="popup.js"></script>
</body>

</html>
