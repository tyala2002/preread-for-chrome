<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preread — 設定</title>
  <style>
    /* ─ 設定ページスタイル (Premium Minimal UI) ───────────────────── */
    :root {
      --bg-base: #faf7f4;
      --bg-surface: #ffffff;
      --bg-surface-hover: #f5ede3;
      --bg-warm-light: #fdf6ee;

      --text-main: #2c1810;
      --text-muted: #8b7355;

      --color-primary: #8b6f47;
      --color-primary-hover: #7a5f3a;
      --color-border: #e8ddd0;

      --color-success: #16a34a;
      --bg-success: #f0fdf4;
      --border-success: #bbf7d0;

      --color-error: #dc2626;
      --bg-error: #fef2f2;
      --border-error: #fecaca;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: var(--text-main);
      background: var(--bg-base);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    svg {
      flex-shrink: 0;
      vertical-align: middle;
    }

    .page-header {
      background: var(--color-primary);
      color: #fff;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-sm);
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-header .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 4px;
    }

    /* ── タブナビゲーション ──────────────────────────────────────────── */
    .tab-nav {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      padding: 0 24px;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text-main);
    }

    .tab-btn.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-main);
      background: var(--bg-base);
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .field-help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .field-help a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .field-help a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
      padding-bottom: 40px;
    }

    .btn-save {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--color-primary);
      color: #fff;
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .btn-save:hover {
      background: var(--color-primary-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .msg-saved {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-success);
      border: 1px solid var(--border-success);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--color-success);
      font-weight: 500;
    }

    .msg-saved.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 管理タブ ─────────────────────────────────────────────────── */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .history-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn-clear-all {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--bg-base);
      color: var(--color-error);
      border: 1px solid var(--border-error);
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear-all:hover {
      background: var(--bg-error);
    }

    .history-empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-base);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: background 0.15s;
    }

    .history-item:hover {
      background: var(--bg-surface-hover);
    }

    .history-item-info {
      flex: 1;
      overflow: hidden;
    }

    .history-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .history-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-open-notebook {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-primary);
      text-decoration: none;
      white-space: nowrap;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .btn-open-notebook:hover {
      opacity: 1;
    }

    .btn-delete-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .btn-delete-item:hover {
      color: var(--color-error);
      background: var(--bg-error);
    }
  </style>
</head>

<body>

  <!-- ── ヘッダー ────────────────────────────────────────────── -->
  <div class="page-header">
    <div>
      <h1>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Preread 設定
      </h1>
      <p class="subtitle">APIキーと履歴を管理してください</p>
    </div>
  </div>

  <!-- ── タブナビゲーション ──────────────────────────────────── -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      APIキー設定
    </button>
    <button class="tab-btn" data-tab="history">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
        <polyline points="10 2 10 10 13 7 16 10 16 2" />
      </svg>
      追加済み書籍
    </button>
  </nav>

  <!-- ── APIキー設定タブ ──────────────────────────────────────── -->
  <div id="tab-settings" class="tab-panel active">
    <div class="container">

      <!-- Web記事検索API（Tavily） -->
      <div class="card">
        <h2 class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          Web記事検索 APIキー
        </h2>
        <p class="card-desc">
          書籍の要約・レビュー記事を検索するためのAPIキーです。<br>
          <strong>Tavily Search API</strong> は無料で1,000クエリ/月使えます。クレジットカード不要。
        </p>

        <div class="form-group">
          <label for="brave-api-key">Tavily APIキー</label>
          <input type="password" id="brave-api-key" placeholder="tvly-..." autocomplete="off" />
          <p class="field-help">
            取得方法:
            <a href="https://app.tavily.com/" target="_blank">app.tavily.com</a>
            でアカウント作成 → APIキーをコピーして貼り付けてください。
          </p>
        </div>
      </div>

      <!-- アクション -->
      <div class="actions">
        <button id="btn-save" class="btn-save">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          設定を保存
        </button>

        <div id="msg-saved" class="msg-saved">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
            <path d="m9 12 2 2 4-4" />
          </svg>
          <span>設定を保存しました</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── 追加済み書籍タブ ─────────────────────────────────────── -->
  <div id="tab-history" class="tab-panel">
    <div class="container">

      <div class="card">
        <h2 class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
            <polyline points="10 2 10 10 13 7 16 10 16 2" />
          </svg>
          追加済みの書籍
        </h2>
        <p class="card-desc">
          NotebookLMにソースを追加した書籍の履歴です。各ノートブックに直接アクセスできます。
        </p>

        <div class="history-header">
          <span id="history-count" class="history-count"></span>
          <button id="btn-clear-all" class="btn-clear-all" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            </svg>
            すべて削除
          </button>
        </div>

        <div id="history-empty" class="history-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            style="margin: 0 auto 12px; display:block; opacity:0.3">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
          </svg>
          まだ書籍が追加されていません
        </div>

        <ul id="history-list" class="history-list"></ul>
      </div>

    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
